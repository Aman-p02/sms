<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container col-md-6 mt-5">
    <h2 class="text-center mb-4">Student Login</h2>
    <div class="card shadow p-4">

        <form action="student_dashboard.html">
            <label>Email</label>
            <input type="text" class="form-control mb-3" placeholder="Enter email">

            <label>Password</label>
            <input type="password" class="form-control mb-3" placeholder="Enter password">

            <button class="btn btn-primary w-100">Login</button>

            <div class="mt-3 d-flex justify-content-between">
                <a href="forgot_password.html">Forgot Password?</a>
                <a href="student_register.html">Create Account</a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
