<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scholarship Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h3 class="mb-3">Scholarship Status Tracking</h3>

    <table class="table table-bordered table-striped shadow">
        <thead class="table-primary">
            <tr>
                <th>Scholarship Name</th>
                <th>Status</th>
                <th>Remarks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Merit Scholarship</td>
                <td>Approved</td>
                <td>Funds will be disbursed soon</td>
            </tr>
            <tr>
                <td>SC/ST Scholarship</td>
                <td>Pending</td>
                <td>Under verification</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
